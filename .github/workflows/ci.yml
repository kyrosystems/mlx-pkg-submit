name: Build & Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build mlx-pkg-submit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc make libcurl4-openssl-dev libssl-dev

      - name: Build
        run: make

      - name: Test --help
        run: ./mlx-pkg-submit --help || true

      - name: Test --dry-run (basic)
        run: |
          ./mlx-pkg-submit \
            --name testpkg \
            --version 1.0.0 \
            --category utils \
            --url https://example.com/test.rpm \
            --file /etc/os-release \
            --summary "Test package" \
            --license MIT \
            --maintainer test@example.com \
            --dry-run

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mlx-pkg-submit-linux-x86_64
          path: mlx-pkg-submit
